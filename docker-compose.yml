version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: easit
      POSTGRES_PASSWORD: easit1234
      POSTGRES_DB: easit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - db
    environment:
      DB_HOST: db

  frontend:
    build: .
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
